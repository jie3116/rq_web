# =========================
# rqdf.co.id (HTTP :80)
# - Allow ACME challenge for Let's Encrypt renewals
# - Redirect everything else to HTTPS
# =========================
server {
    listen 80;
    server_name rqdf.co.id www.rqdf.co.id;

    # Let’s Encrypt HTTP-01 challenge (must stay on HTTP)
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
        default_type "text/plain";
        try_files $uri =404;
    }

    # Redirect all other HTTP traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# =========================
# rqdf.co.id (HTTPS :443)
# - Terminate TLS using Let's Encrypt cert
# - Reverse proxy to Flask/Gunicorn on 127.0.0.1:8001
# =========================
server {
    listen 443 ssl http2;
    server_name rqdf.co.id www.rqdf.co.id;

    ssl_certificate     /etc/letsencrypt/live/rqdf.co.id/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rqdf.co.id/privkey.pem;

    # Reasonable TLS hardening (safe defaults)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    location / {
        proxy_pass http://127.0.0.1:8001;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        proxy_redirect off;
    }
}