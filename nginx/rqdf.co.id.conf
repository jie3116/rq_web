server {
    listen 80;
    server_name www.rqdf.co.id;
    return 301 https://rqdf.co.id$request_uri;
}

server {
    listen 80;
    server_name rqdf.co.id;
    return 301 https://rqdf.co.id$request_uri;
}

server {
    listen 443 ssl;
    server_name www.rqdf.co.id;

    ssl_certificate /etc/letsencrypt/live/rqdf.co.id/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rqdf.co.id/privkey.pem;
    return 301 https://rqdf.co.id$request_uri;
}

server {
    listen 443 ssl;
    server_name rqdf.co.id;

    ssl_certificate /etc/letsencrypt/live/rqdf.co.id/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rqdf.co.id/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    server_tokens off;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    access_log /var/log/nginx/rqdf_access.log;
    error_log /var/log/nginx/rqdf_error.log;

    client_max_body_size 20m;

    location /static/uploads/media/ {
        alias /app/app/static/uploads/media/;
        access_log off;
        expires 7d;
    }

    location / {
        proxy_pass http://web:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
