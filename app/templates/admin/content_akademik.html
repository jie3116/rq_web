{% extends "layout.html" %}
{% block title %}Konten Akademik - Admin{% endblock %}
{% block content %}
<div class="container py-5">
  <h1 class="fw-bold mb-3">Kelola Halaman Akademik</h1>
  {% include "admin/_menu.html" %}

  <form method="POST" class="card border-0 shadow-sm">
    <div class="card-body">
      <label class="form-label">Judul Halaman</label>
      <input class="form-control" name="title" value="{{ page.title }}">

      <label class="form-label mt-3">Subjudul</label>
      <textarea class="form-control js-richtext" name="subtitle" rows="2">{{ page.subtitle }}</textarea>

      <label class="form-label mt-3">Konten Utama</label>
      <textarea class="form-control js-richtext" name="content" rows="6">{{ page.content }}</textarea>

      <label class="form-label mt-3">Poin Utama (satu baris satu poin)</label>
      <textarea class="form-control" name="points" rows="5">{{ page.points }}</textarea>

      <button class="btn btn-dark mt-3">Simpan Konten Akademik</button>
    </div>
  </form>
</div>
{% endblock %}
{% block extra_scripts %}
  {% include "admin/_editor_assets.html" %}
{% endblock %}
