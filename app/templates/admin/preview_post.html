{% extends "layout.html" %}
{% block title %}Preview Berita - Admin{% endblock %}
{% block content %}
<div class="container py-5" style="max-width:920px">
  <h1 class="fw-bold">Preview Berita</h1>
  <div class="text-muted mb-3">Ini preview sebelum disimpan ke website.</div>
  {% if post.cover_url %}
  <img src="{{ post.cover_url }}" class="rounded-4 shadow-sm mb-4" alt="Cover" style="width:100%;max-height:420px;object-fit:cover;">
  {% endif %}
  <h2>{{ post.title }}</h2>
  <p class="text-muted">{{ post.excerpt }}</p>
  <article>{{ post.body|safe }}</article>
  <div class="mt-4">
    <a class="btn btn-dark" href="{{ url_for('admin.content_berita') }}">Kembali ke Form Berita</a>
  </div>
</div>
{% endblock %}
