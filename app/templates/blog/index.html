{% extends "layout.html" %}
{% block title %}Berita - {{ SCHOOL_NAME }}{% endblock %}
{% block content %}
<div class="container py-5">
  <h1 class="fw-bold mb-3">Berita & Artikel</h1>

  <div class="row g-3">
    {% for p in posts %}
    <div class="col-md-4">
      <a class="text-decoration-none text-dark" href="{{ url_for('blog.detail', slug=p.slug) }}">
        <div class="card h-100 shadow-sm border-0">
          <img src="{{ p.cover_url or url_for('static', filename='img/post-placeholder.jpg') }}" class="card-img-top" style="height:180px;object-fit:cover;">
          <div class="card-body">
            <div class="small text-muted">{{ p.published_at.strftime("%d %b %Y") }}</div>
            <h5 class="card-title mt-1">{{ p.title }}</h5>
            <p class="text-muted mb-0">{{ p.excerpt }}</p>
          </div>
        </div>
      </a>
    </div>
    {% else %}
    <div class="col-12"><div class="alert alert-secondary">Belum ada posting.</div></div>
    {% endfor %}
  </div>
</div>
{% endblock %}
