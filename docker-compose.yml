services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: sekolah_app_image:latest
    container_name: sekolah_app
    restart: always
    init: true
    env_file:
      - ${ENV_FILE:-.env}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - media_uploads:/app/app/static/uploads/media
    security_opt:
      - no-new-privileges:true

  db:
    image: postgres:15
    container_name: sekolah_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-rqdf_website}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-rqdf_website}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    security_opt:
      - no-new-privileges:true

volumes:
  postgres_data:
  media_uploads:
